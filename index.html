<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Todo App</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="toDoContainer">
			<h1>My Todo List</h1>
			<div class="input-section">
				<input type="text" id="js-name-input" placeholder="Todo name" />
				<button class="add-btn" id="js-add-btn">Add</button>
			</div>
			<!-- output container for the list -->
			<div class="todo-list-container" id="js-todo-list"></div>
		</div>
		<script src="script.js"></script>
	</body>
</html>
